name: Daily bureau check

on:
  schedule:
    - cron: '0 13 * * *'   # 1pm UTC daily (~6am PT / 9am ET)
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data/ changes back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        run: npm run check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      - name: Commit any state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily bureau check $(date -u +%Y-%m-%d)"
          git push
